<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Facts Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0f172a);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    overflow:hidden;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:700px;
    padding:40px;
    text-align:center;
    border-radius:30px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 25px 45px rgba(0,0,0,.3);
    color:white;
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-size:60px;
    margin-bottom:10px;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitle{
    opacity:.8;
    margin-bottom:30px;
}

button{
    border:none;
    padding:15px 35px;
    border-radius:50px;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 15px 30px rgba(139,92,246,.4);
}

#fact{
    margin-top:30px;
    font-size:1.3rem;
    line-height:1.8;
    min-height:90px;
    opacity:0;
    transition:.5s;
}

.show{
    opacity:1 !important;
    animation:pop .5s ease;
}

@keyframes pop{
    0%{
        transform:scale(.8);
    }
    100%{
        transform:scale(1);
    }
}

.footer{
    margin-top:25px;
    opacity:.6;
    font-size:14px;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.08);
}

.c1{
    width:250px;
    height:250px;
    top:-50px;
    left:-50px;
}

.c2{
    width:300px;
    height:300px;
    bottom:-100px;
    right:-100px;
}

</style>
</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">

<div class="logo">🚀</div>

<h1>Fun Facts Explorer</h1>

<p class="subtitle">
Discover amazing facts from around the world.
</p>

<button onclick="showFact()">
Generate Fact
</button>

<div id="fact">
Click the button to reveal a fun fact!
</div>

<div class="footer">
Built with HTML, CSS & JavaScript
</div>

</div>

<script>

const facts = [

"🍌 Bananas are berries, but strawberries are not.",

"🐙 Octopuses have three hearts and blue blood.",

"🍯 Honey never spoils and can last thousands of years.",

"🦈 Sharks existed before trees appeared on Earth.",

"🌍 A day on Venus is longer than a year on Venus.",

"🐨 Koalas can sleep up to 22 hours a day.",

"🗼 The Eiffel Tower grows taller in summer due to heat expansion.",

"⚡ Lightning strikes Earth about 100 times every second.",

"🌕 The Moon slowly moves away from Earth every year.",

"🐧 Penguins propose with pebbles."
];

function showFact(){

const fact = document.getElementById("fact");

const random = Math.floor(Math.random() * facts.length);

fact.classList.remove("show");

setTimeout(() => {
fact.innerHTML = facts[random];
fact.classList.add("show");
},200);

}

</script>

</body>
</html>
